name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Build distributables on each platform
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: darwin
          - os: windows-latest
            platform: win32

    runs-on: ${{ matrix.os }}

    steps:
      # Setup
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci

      # Build
      - run: npm run make

      # Upload for publish job
      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: out/make
          if-no-files-found: error

  # Publish to GitHub Releases on tag push
  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Collect artifacts from build matrix
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      # Create release with installers and Squirrel update files
      - uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            artifacts/**/*.zip
            artifacts/**/*.exe
            artifacts/**/*.nupkg
            artifacts/**/RELEASES
