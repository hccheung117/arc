name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Build distributables on each platform
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: darwin
          - os: windows-latest
            platform: win32

    runs-on: ${{ matrix.os }}

    steps:
      # Setup
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci

      # Build
      - run: npm run make

      # Upload for publish job
      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: out/make
          if-no-files-found: error

  # Publish to GitHub Releases on tag push
  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        run: |
          LOG=$(git log $(git describe --tags --abbrev=0 HEAD^)..HEAD --pretty=format:"%s" | grep -v "^chore: release" || true)
          for section in "feat:Features" "fix:Fixes" "refactor:Refactors" "perf:Performance" "docs:Docs" "chore:Chores" "style:Style"; do
            type="${section%%:*}"
            heading="${section##*:}"
            entries=$(echo "$LOG" | grep "^$type" | sed 's/^/- /')
            if [ -n "$entries" ]; then
              printf "## %s\n%s\n\n" "$heading" "$entries" >> changelog.md
            fi
          done

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          body_path: changelog.md
          files: |
            artifacts/**/*.zip
            artifacts/**/*.exe
            artifacts/**/*.nupkg
            artifacts/**/RELEASES
