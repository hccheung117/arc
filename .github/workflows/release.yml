name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Build distributables on each platform
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: darwin
          - os: windows-latest
            platform: win32

    runs-on: ${{ matrix.os }}

    steps:
      # Setup
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci

      # macOS: Import signing certificate and API key
      - name: Import code signing certificate
        if: matrix.platform == 'darwin'
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12

          # Decode certificate
          echo "$CERTIFICATE_P12_BASE64" | base64 --decode > "$CERTIFICATE_PATH"

          # Create and configure temporary keychain
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"

          # Import certificate
          security import "$CERTIFICATE_PATH" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "" "$KEYCHAIN_PATH"

          # Add to search list
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain

      - name: Write API key for notarization
        if: matrix.platform == 'darwin'
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          mkdir -p ~/private_keys
          echo "$APPLE_API_KEY_BASE64" | base64 --decode > ~/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8

      # Build
      - run: npm run make
        env:
          APPLE_API_KEY_ID: ${{ matrix.platform == 'darwin' && secrets.APPLE_API_KEY_ID || '' }}
          APPLE_API_ISSUER: ${{ matrix.platform == 'darwin' && secrets.APPLE_API_ISSUER || '' }}
          APPLE_API_KEY_PATH: ${{ matrix.platform == 'darwin' && format('~/private_keys/AuthKey_{0}.p8', secrets.APPLE_API_KEY_ID) || '' }}

      # Upload for publish job
      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: out/make
          if-no-files-found: error

  # Publish to GitHub Releases on tag push
  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        run: |
          LOG=$(git log $(git describe --tags --abbrev=0 HEAD^)..HEAD --pretty=format:"%s" | grep -v "^chore: release" || true)
          for section in "feat:Features" "fix:Fixes" "refactor:Refactors" "perf:Performance" "docs:Docs" "chore:Chores" "style:Style"; do
            type="${section%%:*}"
            heading="${section##*:}"
            entries=$(echo "$LOG" | grep "^$type" | sed 's/^/- /')
            if [ -n "$entries" ]; then
              printf "## %s\n%s\n\n" "$heading" "$entries" >> changelog.md
            fi
          done

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          body_path: changelog.md
          files: |
            artifacts/**/*.zip
            artifacts/**/*.exe
            artifacts/**/*.nupkg
            artifacts/**/RELEASES
